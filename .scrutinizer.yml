build:
  nodes:
    analysis:
      image: huxinator/php84-scrutinizer:latest
      environment:
        variables:
          XDEBUG_MODE: coverage
      tests:
        override:
          - php-scrutinizer-run
    coverage:
      image: huxinator/php84-scrutinizer:latest
      environment:
        variables:
          XDEBUG_MODE: coverage
      tests:
        override:
          - command: ./bin/doctrine orm:generate-proxies && XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-clover build/coverage-clover.xml tests
            coverage:
              file: build/coverage-clover.xml
              format: clover

filter:
  paths:
    - 'src/'
  excluded_paths:
    - 'src/html/'
    - 'src/OrmProxy/'
    - 'src/Public/assets/'
  dependency_paths:
    - 'vendor/'

checks:
  php:
    code_rating: true
